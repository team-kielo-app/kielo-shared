[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kielo-shared"
dynamic = ["version"]
description = "Shared utilities for Kielo platform services"
requires-python = ">=3.11"
dependencies = [
    "SQLAlchemy",
    "certifi",
    "httpx>=0.24",
]

[tool.deptry]

[tool.deptry.per_rule_ignores]
DEP001 = ["asyncpg"]

[tool.setuptools.dynamic]
version = {attr = "kielo_shared.__version__"}

[tool.setuptools.packages.find]
include = ["kielo_shared*"]

[tool.setuptools.package-data]
kielo_shared = ["*.json"]
